{{>fragments/header-simple}}
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Banking App</h3>
                        <h5 class="text-center text-muted mb-4">Login</h5>
                        
                        {{#error}}
                        <div class="alert alert-danger" role="alert" id="error-message">
                            {{error}}
                        </div>
                        {{/error}}
                        
                        <form action="/login" method="post">
                            <input type="hidden" name="{{_csrf.parameterName}}" value="{{_csrf.token}}"/>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="loginButton">Login</button>
                        </form>
                        
                        <div class="mt-4">
                            <small class="text-muted">
                                <strong>Demo users:</strong><br>
                                Customer: username=<code>customer</code>, password=<code>Cu5t0m3r</code><br>
                                Manager: username=<code>manager</code>, password=<code>M4n4g3r</code>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{{>fragments/footer}}
