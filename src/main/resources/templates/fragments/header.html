<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom badge colors for loan status */
        .bg-PENDING {
            background-color: #ffc107 !important;
            /* warning yellow */
            color: #000;
        }

        .bg-APPROVED {
            background-color: #28a745 !important;
            /* success green */
            color: #fff;
        }

        .bg-REJECTED {
            background-color: #dc3545 !important;
            /* danger red */
            color: #fff;
        }

        .bg-PAID {
            background-color: #6c757d !important;
            /* secondary gray */
            color: #fff;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">Banking App</a>
            {{#fullname}}
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Welcome, {{fullname}}</span>
                <form action="/logout" method="post" style="display:inline;">
                    <input type="hidden" name="{{_csrf.parameterName}}" value="{{_csrf.token}}" />
                    <button type="submit" class="btn btn-outline-light btn-sm" id="logoutButton">Logout</button>
                </form>
            </div>
            {{/fullname}}
        </div>
    </nav>
