name: Nightly system tests and Docker artifact

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  system-tests:
    name: System tests - ${{ matrix.os }} - ${{ matrix.browser }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chrome
          - os: ubuntu-latest
            browser: firefox
          - os: windows-latest
            browser: chrome
          - os: windows-latest
            browser: firefox
          - os: windows-latest
            browser: edge
          - os: macos-latest
            browser: chrome
          - os: macos-latest
            browser: firefox


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run system tests
        run: mvn test "-Dtest=TransferE2ETest" "-Dbrowser=${{ matrix.browser }}"

  docker-artifact:
    name: Build Docker nightly artifact
    runs-on: ubuntu-latest
    needs: system-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate nightly tag
        id: nightly
        run: echo "tag=nightly-$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Delete previous nightly artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const artifact of artifacts) {
              if (artifact.name.startsWith("banking-app-nightly-")) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Build Docker image
        run: docker build -t banking-app:${{ steps.nightly.outputs.tag }} .

      - name: Save compressed Docker image as artifact
        run: docker save banking-app:${{ steps.nightly.outputs.tag }} | gzip > banking-app-${{ steps.nightly.outputs.tag }}.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: banking-app-${{ steps.nightly.outputs.tag }}
          path: banking-app-${{ steps.nightly.outputs.tag }}.tar.gz
          retention-days: 14
          compression-level: 0
